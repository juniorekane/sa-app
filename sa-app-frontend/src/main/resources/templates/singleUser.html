<!doctype html>
<html
        layout:decorate="~{fragment/layout}"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
>

<body>

<main layout:fragment="content">
    <h2 class="mb-4">Client Details</h2>

    <!-- Client Information Card -->
    <div class="card mb-4">
        <div class="card-header">
            Client Information
        </div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Client ID</dt>
                <dd class="col-sm-9" th:text="${client.id}">12345</dd>

                <dt class="col-sm-3">E-Mail</dt>
                <dd class="col-sm-9" th:text="${client.email}">client@example.com</dd>
            </dl>
        </div>
    </div>

    <!-- Emotions Card -->
    <div class="card mb-4">
        <div class="card-header">
            Emotions
        </div>
        <div class="card-body">
            <div class="table-responsive" th:if="${client.emotions != null and !client.emotions.isEmpty()}">
                <table class="table table-striped table-hover table-sm">
                    <thead>
                    <tr>
                        <th>Emotions-ID</th>
                        <th>Text</th>
                        <th>Typ</th>
                        <th>Score</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emotion : ${client.emotions}">
                        <td th:text="${emotion.id}">1</td>
                        <td th:text="${emotion.text}">Sample text</td>
                        <td th:text="${emotion.type}">POSITIVE</td>
                        <td th:text="${emotion.score}">0.95</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <p class="text-muted mb-0" th:if="${client.emotions == null or client.emotions.isEmpty()}">
                No emotions found for this client.
            </p>
        </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-outline-dark" onclick="window.history.back()">Back</button>
        <a th:href="@{/ui/client/all}" class="btn btn-outline-primary">All Clients</a>
    </div>
</main>

</body>

</html>
