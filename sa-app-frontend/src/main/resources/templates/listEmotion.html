<!doctype html>
<html
        layout:decorate="~{fragment/layout}"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
>

<body>

<main layout:fragment="content">
    <h2 class="mb-4">All Emotions</h2>

    <div th:if="${status != null}" class="alert alert-info alert-dismissible fade show" role="alert">
        <strong>Status:</strong> <span th:text="${status}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th scope="col">Emotion-ID</th>
                        <th scope="col">Text</th>
                        <th scope="col">Typ</th>
                        <th scope="col">Score</th>
                        <th scope="col">Client-ID</th>
                        <th scope="col">Client E-Mail</th>
                        <th scope="col">Aktion</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(emotions)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            No emotions found.
                        </td>
                    </tr>
                    <tr th:each="emotion : ${emotions}">
                        <td th:text="${emotion.id}"></td>
                        <td th:text="${emotion.text}"></td>
                        <td th:text="${emotion.type}"></td>
                        <td th:text="${emotion.score}"></td>
                        <td th:text="${emotion.client != null ? emotion.client.id : '-'}"></td>
                        <td th:text="${emotion.client != null ? emotion.client.email : '-'}"></td>
                        <td>
                            <form th:action="@{/ui/emotions/delete}" method="post" style="display: inline;">
                                <input type="hidden" name="id" th:value="${emotion.id}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3">
        <form th:action="@{/ui/emotions}" method="get">
            <button type="submit" class="btn btn-primary">Create emotion</button>
        </form>

        <button type="button" class="btn btn-outline-dark" onclick="window.history.back()">Back</button>
    </div>
</main>

</body>

</html>
