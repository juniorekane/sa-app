<!doctype html>
<html
        layout:decorate="~{fragment/layout}"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
>

<body>

<main layout:fragment="content">
    <!-- Page Header -->
    <div class="mb-4">
        <h2 class="display-6">Feature Test Entry Point</h2>
        <p class="lead text-muted">Use this page to test client and emotion features from one place.</p>
    </div>

    <!-- Status Alert -->
    <div th:if="${status != null}" class="alert alert-info alert-dismissible fade show" role="alert">
        <strong>Last status:</strong> <span th:text="${status}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Two Column Layout -->
    <div class="row g-4">
        <!-- Client Features Card -->
        <div class="col-12 col-md-6">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="h5 mb-0">Client Features</h3>
                </div>
                <div class="card-body">
                    <!-- Create Client Form -->
                    <form method="post" th:action="@{/ui/new/client}" th:object="${clientRequest}" class="mb-4">
                        <div class="mb-3">
                            <label for="email" class="form-label">Create client by e-mail</label>
                            <input id="email"
                                   type="email"
                                   th:field="*{email}"
                                   name="email"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                   placeholder="client@example.com"
                                   required/>
                            <div th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"
                                 class="invalid-feedback"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Create client</button>
                    </form>

                    <hr class="my-4">

                    <!-- List All Clients Form -->
                    <form th:action="@{/ui/client/all}" method="get" class="mb-3">
                        <button type="submit" class="btn btn-outline-secondary w-100">
                            List all clients
                        </button>
                    </form>

                    <!-- Find Client by ID Form -->
                    <form th:action="@{/ui/client/find}" method="get">
                        <div class="mb-3">
                            <label for="clientId" class="form-label">Find single client by ID</label>
                            <div class="input-group">
                                <input type="number"
                                       id="clientId"
                                       name="id"
                                       class="form-control"
                                       placeholder="Enter client ID"
                                       min="1"
                                       required>
                                <button type="submit" class="btn btn-outline-secondary">Find client</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Emotion Features Card -->
        <div class="col-12 col-md-6">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="h5 mb-0">Emotion Features</h3>
                </div>
                <div class="card-body">
                    <!-- Open Create Emotion Page Form -->
                    <form th:action="@{/ui/emotions}" method="get" class="mb-3">
                        <button type="submit" class="btn btn-primary w-100">
                            Open create emotion page
                        </button>
                    </form>

                    <!-- List All Emotions Form -->
                    <form th:action="@{/ui/emotions/all}" method="get" class="mb-4">
                        <button type="submit" class="btn btn-outline-secondary w-100">
                            List all emotions
                        </button>
                    </form>

                    <hr class="my-4">

                    <!-- Delete Emotion by ID Form -->
                    <form th:action="@{/ui/emotions/delete}" method="post">
                        <div class="mb-3">
                            <label for="emotionId" class="form-label">Delete emotion by ID</label>
                            <div class="input-group">
                                <input type="number"
                                       id="emotionId"
                                       name="id"
                                       class="form-control"
                                       placeholder="Enter emotion ID"
                                       min="1"
                                       required>
                                <button type="submit" class="btn btn-outline-danger">Delete emotion</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

</body>

</html>
