<!doctype html>
<html
        layout:decorate="~{fragment/layout}"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
>

<body>

<main layout:fragment="content">
    <h2 class="mb-4">All Clients</h2>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th scope="col">Client-ID</th>
                        <th scope="col">E-Mail</th>
                        <th scope="col">Emotionen</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.id}"></td>
                        <td th:text="${client.email}"></td>
                        <td>
                            <div th:if="${client.emotions != null and !client.emotions.isEmpty()}">
                                <table class="table table-sm table-bordered mb-0">
                                    <thead>
                                    <tr>
                                        <th>Emotions-ID</th>
                                        <th>Text</th>
                                        <th>Typ</th>
                                        <th>Score</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="emotion : ${client.emotions}">
                                        <td th:text="${emotion.id}"></td>
                                        <td th:text="${emotion.text}"></td>
                                        <td th:text="${emotion.type}"></td>
                                        <td th:text="${emotion.score}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <span class="text-muted" th:if="${client.emotions == null or client.emotions.isEmpty()}">No emotions</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-outline-dark" onclick="window.history.back()">Back</button>
        <a th:href="@{/ui/client}" class="btn btn-outline-primary">Home</a>
    </div>
</main>

</body>

</html>
